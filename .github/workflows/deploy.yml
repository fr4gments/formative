# Publishes IKAL to GitHub Pages: the app at the site root, the MkDocs
# reference under /docs/. Runs on every push to main.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable GitHub Pages if needed
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build the documentation into _site/docs
        run: |
          pip install "mkdocs>=1.6,<2" "mkdocs-material>=9.6,<10"
          mkdocs build --strict --site-dir _site/docs

      - name: Assemble the app at the site root
        run: |
          cp index.html _site/
          cp -r src _site/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment